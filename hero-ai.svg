<svg width="900" height="506" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="506" fill="url(#bg)"/>
  <!-- Neural network nodes -->
  <circle cx="150" cy="150" r="20" fill="white" opacity="0.9" filter="url(#glow)"/>
  <circle cx="300" cy="100" r="15" fill="white" opacity="0.7" filter="url(#glow)"/>
  <circle cx="450" cy="180" r="25" fill="white" opacity="0.8" filter="url(#glow)"/>
  <circle cx="600" cy="120" r="18" fill="white" opacity="0.7" filter="url(#glow)"/>
  <circle cx="750" cy="160" r="22" fill="white" opacity="0.9" filter="url(#glow)"/>
  <circle cx="200" cy="300" r="16" fill="white" opacity="0.6" filter="url(#glow)"/>
  <circle cx="400" cy="350" r="20" fill="white" opacity="0.8" filter="url(#glow)"/>
  <circle cx="650" cy="320" r="17" fill="white" opacity="0.7" filter="url(#glow)"/>
  <circle cx="300" cy="450" r="14" fill="white" opacity="0.6" filter="url(#glow)"/>
  <circle cx="550" cy="420" r="19" fill="white" opacity="0.8" filter="url(#glow)"/>
  <!-- Connection lines -->
  <line x1="150" y1="150" x2="300" y2="100" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="300" y1="100" x2="450" y2="180" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="450" y1="180" x2="600" y2="120" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="600" y1="120" x2="750" y2="160" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="150" y1="150" x2="200" y2="300" stroke="white" stroke-width="2" opacity="0.3"/>
  <line x1="200" y1="300" x2="400" y2="350" stroke="white" stroke-width="2" opacity="0.3"/>
  <line x1="400" y1="350" x2="650" y2="320" stroke="white" stroke-width="2" opacity="0.3"/>
  <line x1="400" y1="350" x2="550" y2="420" stroke="white" stroke-width="2" opacity="0.3"/>
  <!-- Brain outline -->
  <ellipse cx="680" cy="380" rx="80" ry="60" fill="none" stroke="white" stroke-width="3" opacity="0.5"/>
  <!-- Text -->
  <text x="450" y="260" font-family="Arial" font-size="48" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">NOVA LIGHT</text>
  <text x="450" y="310" font-family="Arial" font-size="20" fill="white" text-anchor="middle" opacity="0.8">AI 知识库 | 资讯 | 教程</text>
</svg>
