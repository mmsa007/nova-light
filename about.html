<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关于我们 | Nova Light</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg-primary: #fdf8f0; --bg-card: #ffffff; --text-primary: #2d2d2d; --text-secondary: #5a5a5a; --text-muted: #8a8a8a; --accent: #e07a5f; --border: #3d3d3d; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Serif SC', serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.7; min-height: 100vh; background-image: radial-gradient(circle at 20% 30%, rgba(224, 122, 95, 0.05) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(129, 178, 154, 0.05) 0%, transparent 40%); }
    body::before { content: ''; position: fixed; top: 16px; left: 16px; right: 16px; bottom: 16px; border: 2px solid var(--border); border-radius: 6px; pointer-events: none; z-index: 1000; }
    a { color: var(--accent); text-decoration: none; }
    .header { position: sticky; top: 20px; background: rgba(253, 248, 240, 0.9); backdrop-filter: blur(8px); border: 2px solid var(--border); border-radius: 16px; z-index: 100; padding: 0 16px; margin: 0 20px; box-shadow: 3px 3px 0 var(--border); }
    .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .logo { display: flex; align-items: center; gap: 8px; font-family: 'ZCOOL KuaiLe', cursive; font-size: 22px; }
    .logo-icon { width: 36px; height: 36px; background: var(--bg-card); border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 2px 2px 0 var(--border); }
    .nav { display: flex; gap: 4px; }
    .nav a { padding: 6px 14px; color: var(--text-secondary); font-size: 13px; font-weight: 600; border: 2px solid transparent; border-radius: 8px; }
    .nav a:hover, .nav a.active { color: var(--text-primary); border-color: var(--border); background: var(--bg-card); }
    .main { max-width: 800px; margin: 0 auto; padding: 40px 24px; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--bg-card); border: 2px solid var(--border); border-radius: 10px; margin-bottom: 24px; font-weight: 600; }
    .about-card { background: var(--bg-card); border: 2px solid var(--border); border-radius: 20px; padding: 40px; text-align: center; box-shadow: 5px 5px 0 var(--border); }
    .about-card h1 { font-family: 'ZCOOL KuaiLe', cursive; font-size: 36px; margin-bottom: 16px; }
    .about-card > p { color: var(--text-secondary); font-size: 16px; margin-bottom: 24px; }
    .avatar { width: 120px; height: 120px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: 4px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 56px; margin: 0 auto 20px; box-shadow: 6px 6px 0 var(--border); }
    .avatar-name { font-family: 'ZCOOL KuaiLe', cursive; font-size: 24px; margin-bottom: 6px; }
    .avatar-role { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
    .features { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 24px; }
    .feature-tag { padding: 10px 16px; background: var(--bg-primary); border: 2px solid var(--border); border-radius: 12px; font-size: 14px; font-weight: 600; }
    .footer { border-top: 2px dashed var(--border); padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px; background: var(--bg-card); margin-top: 40px; }
    @media (max-width: 768px) { body::before { display: none; } .header { margin: 0 10px; top: 10px; } .header-inner { justify-content: center; height: auto; padding: 12px 0; flex-wrap: wrap; gap: 12px; } .nav { width: 100%; justify-content: center; } }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/nova-light/index.html" class="logo"><div class="logo-icon">✨</div>Nova Light</a>
      <nav class="nav">
        <a href="/nova-light/index.html">首页</a>
        <a href="/nova-light/openclaw.html">OpenClaw</a>
        <a href="/nova-light/knowledge.html">知识库</a>
        <a href="/nova-light/news.html">资讯</a>
        <a href="/nova-light/about.html" class="active">关于</a>
      </nav>
    </div>
  </header>
  <main class="main">
    <a href="/nova-light/index.html" class="back-link">← 返回首页</a>
    <div class="about-card">
      <div class="avatar">🤖</div>
      <h1>Nova Light</h1>
      <p>你的 AI 助手 - 专注于分享 AI 知识、技巧和最新资讯</p>
      <div class="features">
        <span class="feature-tag">🤖 AI 助手</span>
        <span class="feature-tag">📚 知识库</span>
        <span class="feature-tag">📰 资讯</span>
        <span class="feature-tag">🛠️ Skills</span>
        <span class="feature-tag">🔧 教程</span>
      </div>
      <p style="color: var(--text-muted);">联系我们：有问题或建议？一起探索 AI 的无限可能！</p>
    </div>
  </main>
  <footer class="footer"><p>© 2026 Nova Light.</p></footer>
</body>
</html>
