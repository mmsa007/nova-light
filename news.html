<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg-primary: #fdf8f0; --bg-card: #ffffff; --text-primary: #2d2d2d; --text-secondary: #5a5a5a; --text-muted: #8a8a8a; --accent: #e07a5f; --accent-light: rgba(224, 122, 95, 0.1); --border: #3d3d3d; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Serif SC', serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.7; min-height: 100vh; background-image: radial-gradient(circle at 20% 30%, rgba(224, 122, 95, 0.05) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(129, 178, 154, 0.05) 0%, transparent 40%); }
    body::before { content: ''; position: fixed; top: 16px; left: 16px; right: 16px; bottom: 16px; border: 2px solid var(--border); border-radius: 6px; pointer-events: none; z-index: 1000; }
    a { color: var(--accent); text-decoration: none; }
    .header { position: sticky; top: 20px; background: rgba(253, 248, 240, 0.9); backdrop-filter: blur(8px); border: 2px solid var(--border); border-radius: 16px; z-index: 100; padding: 0 16px; margin: 0 20px; box-shadow: 3px 3px 0 var(--border); }
    .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .logo { display: flex; align-items: center; gap: 8px; font-family: 'ZCOOL KuaiLe', cursive; font-size: 22px; }
    .logo-icon { width: 36px; height: 36px; background: var(--bg-card); border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 2px 2px 0 var(--border); }
    .nav { display: flex; gap: 4px; }
    .nav a { padding: 6px 14px; color: var(--text-secondary); font-size: 13px; font-weight: 600; border: 2px solid transparent; border-radius: 8px; }
    .nav a:hover, .nav a.active { color: var(--text-primary); border-color: var(--border); background: var(--bg-card); }
    .main { max-width: 1000px; margin: 0 auto; padding: 40px 24px; }
    .page-header { text-align: center; margin-bottom: 40px; }
    .page-header h1 { font-family: 'ZCOOL KuaiLe', cursive; font-size: 42px; margin-bottom: 12px; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--bg-card); border: 2px solid var(--border); border-radius: 10px; margin-bottom: 24px; font-weight: 600; }
    .news-list { display: flex; flex-direction: column; gap: 20px; }
    .news-item { background: var(--bg-card); border: 2px solid var(--border); border-radius: 16px; padding: 24px; display: grid; grid-template-columns: 120px 1fr; gap: 20px; align-items: start; box-shadow: 3px 3px 0 rgba(61,61,61,0.15); }
    .news-image { width: 120px; height: 80px; border: 2px solid var(--border); border-radius: 10px; overflow: hidden; }
    .news-image img { width: 100%; height: 100%; object-fit: cover; }
    .news-content h3 { font-family: 'ZCOOL KuaiLe', cursive; font-size: 20px; margin-bottom: 8px; }
    .news-content p { color: var(--text-secondary); font-size: 14px; margin-bottom: 12px; }
    .news-meta { display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); }
    .tag { display: inline-block; padding: 4px 12px; background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: 700; border: 1px solid var(--border); border-radius: 12px; }
    .footer { border-top: 2px dashed var(--border); padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px; background: var(--bg-card); }
    @media (max-width: 768px) { body::before { display: none; } .header { margin: 0 10px; top: 10px; } .header-inner { justify-content: center; height: auto; padding: 12px 0; flex-wrap: wrap; gap: 12px; } .nav { width: 100%; justify-content: center; } .news-item { grid-template-columns: 1fr; } .news-image { width: 100%; height: 160px; } }
  </style>
</head>

</html>
